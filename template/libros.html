{% extends 'layout.html' %}
{% block title %}Libros{% endblock %}
{% block body %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1>Libros</h1>
    <a class="btn btn-success" href="/add_libro">Agregar Libro</a>
    <a class="btn btn-success" href="/add_categoria">Agregar Categoría</a>
</div>
<div class="table-responsive">
    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Título</th>
                <th>Autor</th>
                <th>Categoría</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for libro in libros %}
            <tr>
                <td>{{ libro[0] }}</td>
                <td>{{ libro[1] }}</td>
                <td>{{ libro[2] }}</td>
                <td>{{ libro[3] }}</td>
                <td>
                    <a class="btn btn-sm btn-primary" href="/edit_libro/{{ libro[0] }}">Editar</a>
                    <a class="btn btn-sm btn-danger" href="/delete_libro/{{ libro[0] }}">Eliminar</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
