{% extends 'layout.html' %}
{% block title %}Editar Renta{% endblock %}
{% block body %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h3 class="card-title">Editar Renta</h3>
                <form action="/update_renta/{{ renta[0] }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Cliente</label>
                        <select class="form-select" name="cliente">
                            {% for cliente in clientes %}
                                <option value="{{ cliente[0] }}" {% if cliente[0] == renta[1] %}selected{% endif %}>{{ cliente[1] }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Libro</label>
                        <select class="form-select" name="libro">
                            {% for libro in libros %}
                                <option value="{{ libro[0] }}" {% if libro[0] == renta[2] %}selected{% endif %}>{{ libro[1] }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Cantidad</label>
                        <input class="form-control" type="number" name="cantidad" value="{{ renta[3] }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Fecha de Renta</label>
                        <input class="form-control" type="date" name="fecha_renta" value="{{ renta[4] }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Fecha de Devolución</label>
                        <input class="form-control" type="date" name="fecha_devolucion" value="{{ renta[5] }}">
                    </div>
                    <button class="btn btn-primary" type="submit">Guardar</button>
                    <a class="btn btn-link" href="/rentas">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
