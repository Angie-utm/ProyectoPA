<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mi Biblioteca{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/litera/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { 
            padding-bottom: 60px; 
            background-color: #0f0f0f;
            color: #5e5656;
        }
        main { 
            background-color: #0f0f0f; 
        }
        .container {
            background-color: #0f0f0f;
        }
        /* Tablas */
        .table {
            color: #e0e0e0;
            border-color: #2a2a2a;
        }
        .table tbody tr {
            border-color: #2a2a2a;
            transition: all 0.3s ease;
        }
        .table tbody tr:hover {
            background-color: rgba(139, 58, 58, 0.15);
            border-left: 3px solid #8B3A3A;
            padding-left: 8px;
        }
        .table-dark {
            background-color: #1a1a1a;
            border-color: #2a2a2a;
            border-left: 4px solid #8B3A3A;
        }
        .table-dark th {
            background-color: rgba(139, 58, 58, 0.1);
            color: #C85A54;
            border-color: #2a2a2a;
            font-weight: 600;
        }
        .table td, .table th {
            border-color: #2a2a2a;
            color: #f5f2f2;

            background-color: #1a1a1a;
        }
        /* Tarjetas */
        .card {
            background-color: #1a1a1a;
            border-color: #8B3A3A;
            border-width: 2px;
            color: #5e5656;
            box-shadow: 0 4px 15px rgba(139, 58, 58, 0.1);
            transition: all 0.3s ease;
        }
        .card:hover {
            border-color: #C85A54;
            box-shadow: 0 8px 25px rgba(139, 58, 58, 0.2);
            transform: translateY(-2px);
        }
        .card-body {
            background-color: #1a1a1a;
            color: #5e5656;
        }
        .card-title, .card-header {
            color: #C85A54;
            font-weight: 600;
        }
        /* Formularios */
        .form-control {
            background-color: #2a2a2a;
            border-color: #3a3a3a;
            border-width: 1px;
            color: #5e5656;
            transition: all 0.3s ease;
        }
        .form-control:hover {
            border-color: #8B3A3A;
        }
        .form-control::placeholder {
            color: #888888;
        }
        .form-control:focus {
            background-color: #2a2a2a;
            border-color: #C85A54;
            color: #e0e0e0;
            box-shadow: 0 0 0 0.25rem rgba(139, 58, 58, 0.25);
        }
        .form-select {
            background-color: #2a2a2a;
            border-color: #3a3a3a;
            border-width: 1px;
            color: #e0e0e0;
            transition: all 0.3s ease;
        }
        .form-select:hover {
            border-color: #8B3A3A;
        }
        .form-select:focus {
            background-color: #2a2a2a;
            border-color: #C85A54;
            color: #e0e0e0;
            box-shadow: 0 0 0 0.25rem rgba(139, 58, 58, 0.25);
        }
        /* Labels */
        .form-label {
            color: #e0e0e0;
        }
        /* Headings */
        h1, h2, h3, h4, h5, h6 {
            color: #e0e0e0;
        }
        /* Links */
        a {
            color: #C85A54;
        }
        a:hover {
            color: #D97968;
        }
        /* Botones */
        .btn-primary {
            background-color: #8B3A3A;
            border-color: #8B3A3A;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(139, 58, 58, 0.3);
        }
        .btn-primary:hover {
            background-color: #A84646;
            border-color: #A84646;
            box-shadow: 0 4px 12px rgba(139, 58, 58, 0.5);
            transform: translateY(-1px);
        }
        .btn-primary:focus, .btn-primary.focus {
            background-color: #A84646;
            border-color: #A84646;
            box-shadow: 0 0 0 0.25rem rgba(139, 58, 58, 0.5);
        }
        .btn-success {
            background-color: #8B3A3A;
            border-color: #8B3A3A;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(139, 58, 58, 0.3);
        }
        .btn-success:hover {
            background-color: #A84646;
            border-color: #A84646;
            box-shadow: 0 4px 12px rgba(139, 58, 58, 0.5);
            transform: translateY(-1px);
        }
        .btn-danger {
            background-color: #C85A54;
            border-color: #C85A54;
            transition: all 0.3s ease;
        }
        .btn-danger:hover {
            background-color: #E0745A;
            border-color: #E0745A;
            box-shadow: 0 4px 12px rgba(200, 90, 84, 0.4);
        }
        .btn-primary.active, .btn-primary:active {
            background-color: #6B2E2E;
            border-color: #6B2E2E;
        }
        .btn-sm {
            transition: all 0.2s ease;
        }
        /* Navbar */
        .navbar {
            background: linear-gradient(90deg, #1a1a1a 0%, #2a2a2a 100%);
            border-bottom: 2px solid #8B3A3A;
        }
        .navbar-brand {
            color: #C85A54 !important;
            font-weight: bold;
            font-size: 1.5rem;
            transition: all 0.3s ease;
        }
        .navbar-brand:hover {
            color: #E0745A !important;
            text-shadow: 0 0 10px rgba(200, 90, 84, 0.5);
        }
        .nav-link {
            transition: all 0.3s ease;
            position: relative;
        }
        .nav-link:hover {
            color: #C85A54 !important;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background-color: #C85A54;
            transition: width 0.3s ease;
        }
        .nav-link:hover::after {
            width: 100%;
        }
        /* Otros elementos */
        .table-responsive {
            border-radius: 4px;
            overflow: hidden;
        }
        .mb-3 {
            margin-bottom: 1.5rem !important;
        }
        /* Mejoras de accesibilidad y hover */
        button, .btn {
            font-weight: 500;
        }
        input:disabled, select:disabled {
            background-color: #1a1a1a;
            color: #666666;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/menu">Biblioteca</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/clientes">Clientes</a></li>
                    <li class="nav-item"><a class="nav-link" href="/libros">Libros</a></li>
                    <li class="nav-item"><a class="nav-link" href="/rentas">Rentas</a></li>
                    {% if 'logged_in' in session %}
                    <li class="nav-item"><a class="nav-link" href="/logout">Cerrar Sesión</a></li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        {% block body %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoYz1KkV7r3mQZ1Zr2r5s6Qn1qv1qz2R6q" crossorigin="anonymous"></script>
</body>
</html>
