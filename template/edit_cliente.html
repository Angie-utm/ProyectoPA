{% extends 'layout.html' %}
{% block title %}Editar Cliente{% endblock %}
{% block body %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h3 class="card-title">Editar Cliente</h3>
                <form action="/update_cliente/{{ clientes[0] }}" method="POST">
                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre:</label>
                        <input class="form-control" type="text" id="nombre" name="nombre" value="{{ clientes[1] }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="telefono" class="form-label">Teléfono:</label>
                        <input class="form-control" type="text" id="telefono" name="telefono" value="{{ clientes[2] }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="correo" class="form-label">Correo:</label>
                        <input class="form-control" type="email" id="correo" name="correo" value="{{ clientes[3] }}" required>
                    </div>
                    <button class="btn btn-primary" type="submit">Actualizar Cliente</button>
                    <a class="btn btn-link" href="/clientes">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
