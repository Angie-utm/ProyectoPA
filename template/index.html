
{% extends 'layout.html' %}
{% block title %}Login{% endblock %}
{% block body %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Iniciar sesión</h5>
                <form action="/login" method="POST">
                    <div class="mb-3">
                        <input class="form-control" type="text" name="usuario" placeholder="Ingrese su usuario">
                    </div>
                    <div class="mb-3">
                        <input class="form-control" type="password" name="contraseña" placeholder="Ingrese su contraseña">
                    </div>
                    <button class="btn btn-primary" type="submit">Ingresar</button>
                </form>
                {% if error %}
                    <div class="mt-3 text-danger">{{ error }}</div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
